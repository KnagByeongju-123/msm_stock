<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>소모품관리</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
  margin: 0; padding: 0;
  background: linear-gradient(135deg, #1a3a5c 0%, #2c5282 100%);
  min-height: 100vh; color: #222;
}
.header {
  padding: 32px 20px 24px; text-align: center; color: white;
}
.header h1 {
  margin: 0 0 6px 0; font-size: 24px; font-weight: 700;
  letter-spacing: -0.5px;
}
.header p {
  margin: 0; font-size: 13px; opacity: 0.85;
}

.container {
  background: #f5f7fa;
  border-radius: 24px 24px 0 0;
  min-height: calc(100vh - 110px);
  padding: 20px 16px 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  max-width: 600px;
  margin: 0 auto 20px auto;
}

.card {
  background: white; border-radius: 16px; padding: 20px 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer; border: none;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  transition: transform 0.1s, box-shadow 0.1s;
  text-align: center; min-height: 130px;
  text-decoration: none; color: inherit;
}
.card:active {
  transform: scale(0.97);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.card .icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: white;
}
.card .label {
  font-size: 14px; font-weight: 600; line-height: 1.3;
  color: #222;
}
.card .desc {
  font-size: 11px; color: #888; line-height: 1.3;
}

.card.c1 .icon { background: linear-gradient(135deg, #28a745, #20c997); }
.card.c2 .icon { background: linear-gradient(135deg, #1a3a5c, #2c5282); }
.card.c3 .icon { background: linear-gradient(135deg, #fd7e14, #ff9a3c); }
.card.c4 .icon { background: linear-gradient(135deg, #6f42c1, #8b5cf6); }
.card.c5 .icon { background: linear-gradient(135deg, #dc3545, #e74c3c); }
.card.c6 .icon { background: linear-gradient(135deg, #17a2b8, #20c4d8); }

.card.coming-soon {
  background: #ebeef2; cursor: default;
}
.card.coming-soon:active { transform: none; }
.card.coming-soon .icon {
  background: #c5ccd6 !important; color: #8a93a0;
}
.card.coming-soon .label { color: #8a93a0; }
.card.coming-soon .desc { color: #aab2bd; }

.section-title {
  font-size: 12px; color: #888; font-weight: 600;
  margin: 8px 4px 10px 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.footer {
  text-align: center; margin-top: 30px;
  font-size: 11px; color: #aab2bd;
}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 소모품관리</h1>
  <p>현장에서 쓰는 도구 모음</p>
</div>

<div class="container">

  <div class="section-title">📦 재고 / 자재</div>
  <div class="grid">
    <a class="card c1" href="https://knagbyeongju-123.github.io/msm_stock/stock1.html" target="_blank" rel="noopener">
      <div class="icon">📦</div>
      <div class="label">소모품 재고관리</div>
      <div class="desc">소모품 입출고 / 재고 조회</div>
    </a>

    <button class="card coming-soon" type="button">
      <div class="icon">➕</div>
      <div class="label">도구 추가</div>
      <div class="desc">곧 추가됩니다</div>
    </button>
  </div>

  <div class="section-title">📊 보고 / 결재</div>
  <div class="grid">
    <a class="card c4" href="https://knagbyeongju-123.github.io/smtec_main2/approval_report.html" target="_blank" rel="noopener">
      <div class="icon">📊</div>
      <div class="label">월 보고서</div>
      <div class="desc">월간 결재 보고서 작성</div>
    </a>

    <button class="card coming-soon" type="button">
      <div class="icon">➕</div>
      <div class="label">도구 추가</div>
      <div class="desc">곧 추가됩니다</div>
    </button>
  </div>

  <div class="footer">
    v1.1 · msm
  </div>
</div>

<script>
// 모바일 터치 더블 파이어 방지
document.querySelectorAll('.card').forEach(card => {
  if (card.classList.contains('coming-soon')) return;
  let touched = false;

  card.addEventListener('touchend', e => {
    if (card.tagName === 'A') {
      // 링크 카드는 기본 동작(새 탭 열기) 사용
      return;
    }
    e.preventDefault();
    touched = true;
    card.click();
    setTimeout(() => touched = false, 500);
  });
});
</script>

</body>
</html>
