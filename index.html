<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>재고관리(공구)</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
  margin: 0; padding: 0;
  background: linear-gradient(135deg, #1a3a5c 0%, #2c5282 100%);
  min-height: 100vh; color: #222;
}
.header {
  padding: 32px 20px 24px; text-align: center; color: white;
}
.header h1 {
  margin: 0 0 6px 0; font-size: 24px; font-weight: 700;
  letter-spacing: -0.5px;
}
.header h1 .ver {
  font-size: 12px; opacity: 0.7; margin-left: 8px; font-weight: 400;
  vertical-align: middle;
}
.header p {
  margin: 0; font-size: 13px; opacity: 0.85;
}

.container {
  background: #f5f7fa;
  border-radius: 24px 24px 0 0;
  min-height: calc(100vh - 110px);
  padding: 20px 16px 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  max-width: 600px;
  margin: 0 auto 20px auto;
}

.card {
  background: white; border-radius: 16px; padding: 20px 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer; border: none;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  transition: transform 0.1s, box-shadow 0.1s;
  text-align: center; min-height: 130px;
  text-decoration: none; color: inherit;
}
.card:active {
  transform: scale(0.97);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.card .icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: white;
}
.card .label {
  font-size: 14px; font-weight: 600; line-height: 1.3;
  color: #222;
}
.card .desc {
  font-size: 11px; color: #888; line-height: 1.3;
}

.card.c1 .icon { background: linear-gradient(135deg, #28a745, #20c997); }
.card.c2 .icon { background: linear-gradient(135deg, #1a3a5c, #2c5282); }
.card.c3 .icon { background: linear-gradient(135deg, #fd7e14, #ff9a3c); }
.card.c4 .icon { background: linear-gradient(135deg, #6f42c1, #8b5cf6); }
.card.c5 .icon { background: linear-gradient(135deg, #dc3545, #e74c3c); }
.card.c6 .icon { background: linear-gradient(135deg, #17a2b8, #20c4d8); }

.card.coming-soon {
  background: #ebeef2; cursor: default;
}
.card.coming-soon:active { transform: none; }
.card.coming-soon .icon {
  background: #c5ccd6 !important; color: #8a93a0;
}
.card.coming-soon .label { color: #8a93a0; }
.card.coming-soon .desc { color: #aab2bd; }

.section-title {
  font-size: 12px; color: #888; font-weight: 600;
  margin: 8px 4px 10px 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.footer {
  text-align: center; margin-top: 30px;
  font-size: 11px; color: #aab2bd;
}

/* 내 정보 모달 */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; padding: 16px;
}
.modal-bg.show { display: flex; }
.modal {
  background: white; border-radius: 14px; padding: 20px;
  width: 100%; max-width: 380px;
}
.modal h2 {
  margin: 0 0 6px 0; font-size: 18px; color: #1a3a5c;
}
.modal .sub {
  margin: 0 0 16px 0; font-size: 12px; color: #888; line-height: 1.5;
}
.modal label {
  display: block; font-size: 13px; font-weight: 600;
  color: #555; margin-bottom: 6px; margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input {
  width: 100%; padding: 10px 12px; border: 1px solid #ccc;
  border-radius: 6px; font-size: 15px; font-family: inherit;
}
.modal input:focus { outline: none; border-color: #1a3a5c; }
.modal-btns {
  display: flex; gap: 8px; margin-top: 18px;
}
.modal-btns button {
  flex: 1; padding: 11px; border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-cancel { background: #e9ecef; color: #333; }
.btn-save { background: #1a3a5c; color: white; }

/* 사용자 표시 배지 */
.user-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: white; padding: 4px 10px; border-radius: 14px;
  font-size: 12px; margin-top: 8px; cursor: pointer;
}
.user-badge .ic { font-size: 13px; }
.user-badge.empty { opacity: 0.65; }
</style>
</head>
<body>

<div class="header">
  <h1>🔧 재고관리(공구) <span class="ver">v1.6</span></h1>
  <div class="user-badge empty" id="userBadge">
    <span class="ic">👤</span>
    <span id="userBadgeText">내 정보 등록</span>
  </div>
</div>

<div class="container">

  <div class="section-title">📦 재고 / 자재</div>
  <div class="grid">
    <a class="card c1" href="https://knagbyeongju-123.github.io/msm_stock/stock1.html" target="_blank" rel="noopener">
      <div class="icon">📦</div>
      <div class="label">재고관리</div>
      <div class="desc">소모품 입출고 / 재고 조회</div>
    </a>

    <a class="card c2" href="https://knagbyeongju-123.github.io/msm_stock/qr.html" target="_blank" rel="noopener">
      <div class="icon">🔳</div>
      <div class="label">위치 QR 생성</div>
      <div class="desc">랙별 QR 라벨 만들기</div>
    </a>
  </div>

  <div class="section-title">📋 보고 / 결재</div>
  <div class="grid">
    <a class="card c4" href="https://knagbyeongju-123.github.io/msm_stock/approval.html" target="_blank" rel="noopener">
      <div class="icon">📄</div>
      <div class="label">보고서</div>
      <div class="desc">월보고/발주/폐기 PDF·Excel</div>
    </a>

    <button class="card c6" type="button" id="cardUser">
      <div class="icon">👤</div>
      <div class="label">내 정보</div>
      <div class="desc">부서·이름 등록 / 자동 채움</div>
    </button>
  </div>

  <div class="footer">
    v1.6 · msm
  </div>
</div>

<!-- 내 정보 모달 -->
<div class="modal-bg" id="modalUser">
  <div class="modal">
    <h2>👤 내 정보</h2>
    <p class="sub">한 번 등록해두면 보고서 작성·재고 입출고 시 자동으로 채워집니다.<br>이 폰에만 저장됩니다.</p>

    <label>부서명</label>
    <input type="text" id="inpDept" placeholder="예: 생산팀, 품질관리팀">

    <label>이름</label>
    <input type="text" id="inpName" placeholder="예: 홍길동">

    <div class="modal-btns">
      <button class="btn-cancel" id="btnCancel" type="button">취소</button>
      <button class="btn-save" id="btnSave" type="button">저장</button>
    </div>
  </div>
</div>

<script>
'use strict';
(function() {
  // 공용 사용자 정보 키 (재고관리/보고서가 같이 읽음)
  const K_DEPT = 'msmUser_dept';
  const K_NAME = 'msmUser_name';

  function $(id) { return document.getElementById(id); }

  function refreshBadge() {
    const dept = localStorage.getItem(K_DEPT) || '';
    const name = localStorage.getItem(K_NAME) || '';
    const badge = $('userBadge');
    const text = $('userBadgeText');
    if (dept || name) {
      badge.classList.remove('empty');
      text.textContent = (name || '') + (dept ? ' · ' + dept : '');
    } else {
      badge.classList.add('empty');
      text.textContent = '내 정보 등록 (탭)';
    }
  }

  function openModal() {
    $('inpDept').value = localStorage.getItem(K_DEPT) || '';
    $('inpName').value = localStorage.getItem(K_NAME) || '';
    $('modalUser').classList.add('show');
    setTimeout(() => $('inpName').focus(), 100);
  }

  function closeModal() {
    $('modalUser').classList.remove('show');
  }

  function saveInfo() {
    const dept = $('inpDept').value.trim();
    const name = $('inpName').value.trim();
    if (dept) localStorage.setItem(K_DEPT, dept);
    else localStorage.removeItem(K_DEPT);
    if (name) localStorage.setItem(K_NAME, name);
    else localStorage.removeItem(K_NAME);
    refreshBadge();
    closeModal();
  }

  // 카드/배지 탭 → 모달 열기 (모바일 중복 발화 방지)
  function tap(elOrId, handler) {
    const el = typeof elOrId === 'string' ? $(elOrId) : elOrId;
    if (!el) return;
    let touched = false;
    el.addEventListener('touchend', e => {
      touched = true;
      e.preventDefault();
      handler(e);
      setTimeout(() => { touched = false; }, 500);
    }, { passive: false });
    el.addEventListener('click', e => {
      if (touched) return;
      handler(e);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    refreshBadge();
    tap('cardUser', openModal);
    tap('userBadge', openModal);
    tap('btnCancel', closeModal);
    tap('btnSave', saveInfo);

    // 모달 배경 탭 시 닫기
    $('modalUser').addEventListener('click', e => {
      if (e.target.id === 'modalUser') closeModal();
    });

    // 카드(외부 링크 a 태그)는 정상 동작하도록 별도 처리 - 기존 로직 유지
    document.querySelectorAll('.card').forEach(card => {
      if (card.tagName === 'A') return; // a 태그는 그대로
      if (card.id === 'cardUser') return; // 이미 처리됨
    });
  });
})();
</script>

</body>
</html>
